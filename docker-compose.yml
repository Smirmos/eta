services:
  postgres:
    image: postgres:16-alpine
    container_name: eta-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eta_dev}
      POSTGRES_USER: ${POSTGRES_USER:-eta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - eta-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eta} -d ${POSTGRES_DB:-eta_dev}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eta-postgres-data:
    name: eta-postgres-data
